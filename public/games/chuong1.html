<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đấu trường Meta: Ngăn kéo Ký ức (Pro Version)</title>
    <style>
        * {
            font-family: "Times New Roman", Times, serif !important;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #050302; /* Nền ngoài cùng cực tối */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 0 100px rgba(0, 0, 0, 1);
            /* Con trỏ kính lúp cổ điển */
            cursor: url('https://cdn-icons-png.flaticon.com/32/639/639352.png') 16 16, auto;
        }

        canvas:active {
            cursor: grabbing;
        }

        /* Lớp phủ màn hình bắt đầu */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 5, 2, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .intro-box {
            background: radial-gradient(circle, #3a2518 0%, #170e09 100%);
            border: 6px solid #8b5a2b;
            border-radius: 12px;
            padding: 40px 50px;
            text-align: center;
            max-width: 750px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 20px 50px #000;
            color: #e0d4b8;
        }

        .intro-box h1 {
            color: #f4b41a;
            font-size: 42px;
            margin-top: 0;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 2px 2px 5px #000;
            border-bottom: 2px dashed #8b5a2b;
            padding-bottom: 15px;
        }

        .intro-box p {
            font-size: 24px;
            line-height: 1.6;
        }

        .start-btn {
            margin-top: 35px;
            padding: 15px 60px;
            font-size: 26px;
            font-weight: bold;
            background: linear-gradient(180deg, #d4b895 0%, #8b5a2b 100%);
            color: #1a0f07;
            border: 3px solid #f4e4c1;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            text-transform: uppercase;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            background: linear-gradient(180deg, #f4e4c1 0%, #a67c52 100%);
            box-shadow: 0 15px 25px rgba(244, 180, 26, 0.4);
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <canvas id="gameCanvas" width="1200" height="800"></canvas>
        
        <div id="start-screen">
            <div class="intro-box">
                <h1>Ngăn kéo Ký ức</h1>
                <p><b>Chương 1: Vì sao phải học lịch sử?</b></p>
                <p>Khám phá chiếc bàn làm việc của một nhà khảo cổ học. Hãy dùng kính lúp soi xét từng hiện vật và cẩn thận phân loại chúng vào đúng 3 ngăn kéo: <br><span style="color:#f4b41a;">Truyền miệng — Chữ viết — Hiện vật</span>.</p>
                <button class="start-btn" id="btn-start">MỞ NGĂN KÉO</button>
            </div>
        </div>
    </div>

    <!-- Âm thanh chất lượng cao -->
    <audio id="sfx-paper" src="https://actions.google.com/sounds/v1/office/paper_flip.ogg" preload="auto"></audio>
    <audio id="sfx-slide" src="https://actions.google.com/sounds/v1/wood/wood_plank_movement.ogg" preload="auto"></audio>
    <audio id="sfx-success" src="https://actions.google.com/sounds/v1/cartoon/magic_chime.ogg" preload="auto"></audio>
    <audio id="sfx-error" src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg" preload="auto"></audio>
    <audio id="sfx-win" src="https://actions.google.com/sounds/v1/foley/brass_bell_series.ogg" preload="auto"></audio>

    <script>
        // ==========================================
        // CẤU HÌNH CANVAS & BIẾN TOÀN CỤC
        // ==========================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const cw = canvas.width;
        const ch = canvas.height;

        const sfxPaper = document.getElementById('sfx-paper');
        const sfxSlide = document.getElementById('sfx-slide');
        const sfxSuccess = document.getElementById('sfx-success');
        const sfxError = document.getElementById('sfx-error');
        const sfxWin = document.getElementById('sfx-win');

        let gameState = 'START'; // START, PLAYING, WIN
        let particles = [];
        let itemsPlaced = 0;
        let time = 0;

        // Tương tác chuột
        let isDragging = false;
        let dragItem = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        // ==========================================
        // DỮ LIỆU BÀI HỌC (TƯ LIỆU LỊCH SỬ)
        // ==========================================
        const dataItems = [
            { id: '1', label: 'Sự tích Trăm Trứng', type: 'truyen-mieng', 
              desc: 'Câu chuyện dân gian truyền miệng kể về nguồn gốc dân tộc Việt Nam từ bọc trăm trứng của mẹ Âu Cơ.' },
            { id: '2', label: 'Rìu tay núi Đọ', type: 'hien-vat', 
              desc: 'Công cụ bằng đá được ghè đẽo thô sơ của Người tối cổ, là minh chứng vật chất cho sự tồn tại của con người từ rất sớm.' },
            { id: '3', label: 'Bia Tiến sĩ', type: 'chu-viet', 
              desc: 'Bia đá có khắc chữ Hán ghi danh những người đỗ đạt cao thời phong kiến, lưu giữ tại Văn Miếu.' },
            { id: '4', label: 'Trống đồng Ngọc Lũ', type: 'hien-vat', 
              desc: 'Bảo vật quốc gia với những hoa văn tinh xảo, thể hiện đỉnh cao nghệ thuật đúc đồng của cư dân Văn Lang.' },
            { id: '5', label: 'Sự tích Thánh Gióng', type: 'truyen-mieng', 
              desc: 'Truyền thuyết ngợi ca tinh thần chống giặc ngoại xâm và sức mạnh đoàn kết của dân tộc ta.' },
            { id: '6', label: 'Chiếu dời đô', type: 'chu-viet', 
              desc: 'Văn bản do vua Lý Công Uẩn viết năm 1010, quyết định dời đô từ Hoa Lư về thành Đại La.' }
        ];

        // ==========================================
        // CÁC LỚP ĐỐI TƯỢNG (CLASSES)
        // ==========================================

        // 1. Ngăn kéo (Drawer)
        class Drawer {
            constructor(id, label, x, y, w, h) {
                this.id = id;
                this.label = label;
                this.x = x;
                this.y = y;
                this.w = w;
                this.h = h;
                this.isHovered = false;
                this.glow = 0; // Hiệu ứng sáng lên
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                // Bóng đổ hốc ngăn kéo
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 15;
                ctx.shadowOffsetY = 10;

                // Thân ngăn kéo (Màu gỗ đậm)
                const grad = ctx.createLinearGradient(0, 0, 0, this.h);
                grad.addColorStop(0, '#5c3a21');
                grad.addColorStop(1, '#2c180b');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, this.w, this.h);

                // Viền gỗ
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#1a0d04';
                ctx.lineWidth = 4;
                ctx.strokeRect(0, 0, this.w, this.h);

                // Hiệu ứng phát sáng khi đưa đồ vật lại gần (Hover/Drag Over)
                if (this.isHovered) {
                    this.glow = Math.min(this.glow + 0.1, 1);
                } else {
                    this.glow = Math.max(this.glow - 0.1, 0);
                }
                
                if (this.glow > 0) {
                    ctx.globalAlpha = this.glow * 0.3;
                    ctx.fillStyle = '#f4b41a';
                    ctx.fillRect(2, 2, this.w - 4, this.h - 4);
                    ctx.globalAlpha = 1.0;
                }

                // Tay nắm ngăn kéo bằng đồng
                ctx.fillStyle = '#b5a642';
                ctx.beginPath();
                ctx.roundRect(this.w/2 - 40, 20, 80, 15, 5);
                ctx.fill();
                ctx.strokeStyle = '#5c3a21';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Nhãn tên bằng đồng thau
                ctx.fillStyle = '#d4b895';
                ctx.fillRect(this.w/2 - 70, 50, 140, 40);
                ctx.strokeRect(this.w/2 - 70, 50, 140, 40);

                // Chữ trên nhãn
                ctx.fillStyle = '#3e200c';
                ctx.font = 'bold 22px "Times New Roman"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.label, this.w/2, 72);

                ctx.restore();
            }
        }

        // 2. Hiện vật / Thẻ bài (Artifact)
        class Artifact {
            constructor(data) {
                this.id = data.id;
                this.type = data.type;
                this.label = data.label;
                this.desc = data.desc;
                
                this.w = 160;
                this.h = 110;
                
                // Vị trí gốc ngẫu nhiên trên mặt bàn
                this.originX = Math.random() * (cw - 300) + 150;
                this.originY = Math.random() * (ch - 450) + 300;
                
                this.x = this.originX;
                this.y = this.originY;
                
                this.originAngle = (Math.random() - 0.5) * 0.5; // Nghiêng ngẫu nhiên
                this.angle = this.originAngle;
                
                this.scale = 1;
                this.isPlaced = false;
                
                // Thuộc tính vật lý (Lerp)
                this.targetX = this.x;
                this.targetY = this.y;
                this.targetAngle = this.angle;
                this.targetScale = this.scale;
            }

            update() {
                if (this.isPlaced) return;

                // Nội suy (Lerp) mượt mà về mục tiêu
                this.x += (this.targetX - this.x) * 0.2;
                this.y += (this.targetY - this.y) * 0.2;
                this.angle += (this.targetAngle - this.angle) * 0.2;
                this.scale += (this.targetScale - this.scale) * 0.2;
            }

            draw() {
                if (this.isPlaced) return;

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.scale(this.scale, this.scale);

                // Bóng đổ (Lớn và nhoè hơn khi được nhấc lên)
                let isLifted = (this.scale > 1.05);
                ctx.shadowColor = 'rgba(0,0,0,0.6)';
                ctx.shadowBlur = isLifted ? 25 : 8;
                ctx.shadowOffsetY = isLifted ? 15 : 4;
                ctx.shadowOffsetX = isLifted ? 5 : 2;

                // Nền thẻ bài (Giấy da / Parchment)
                ctx.fillStyle = '#eedcb1';
                ctx.beginPath();
                ctx.roundRect(-this.w/2, -this.h/2, this.w, this.h, 8);
                ctx.fill();

                // Viền hoạ tiết
                ctx.shadowBlur = 0; // Tắt bóng cho chi tiết bên trong
                ctx.strokeStyle = '#c4a678';
                ctx.lineWidth = 2;
                ctx.strokeRect(-this.w/2 + 6, -this.h/2 + 6, this.w - 12, this.h - 12);

                // Dấu mộc đỏ giả cổ ở góc
                ctx.fillStyle = 'rgba(139, 0, 0, 0.4)';
                ctx.beginPath();
                ctx.arc(-this.w/2 + 20, -this.h/2 + 20, 10, 0, Math.PI*2);
                ctx.fill();

                // Chữ trên thẻ
                ctx.fillStyle = '#3e200c';
                ctx.font = 'bold 20px "Times New Roman"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // Xuống dòng tự động nếu tên quá dài
                const words = this.label.split(' ');
                if (words.length > 3) {
                    ctx.fillText(words.slice(0,2).join(' '), 0, -10);
                    ctx.fillText(words.slice(2).join(' '), 0, 15);
                } else {
                    ctx.fillText(this.label, 0, 0);
                }

                ctx.restore();
            }
        }

        // 3. Hệ thống Hạt bụi / Ma thuật (Particle)
        class Particle {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type; // 'dust' hoặc 'spark'
                
                if (type === 'dust') {
                    this.vx = (Math.random() - 0.5) * 0.5;
                    this.vy = (Math.random() - 0.5) * 0.5 - 0.2; // Bay nhẹ lên
                    this.size = Math.random() * 2 + 1;
                    this.life = Math.random();
                    this.decay = 0.005;
                    this.color = 'rgba(224, 212, 184, '; // Vàng nhạt
                } else {
                    // Pháo hoa khi thả đúng
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 8 + 2;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.size = Math.random() * 4 + 2;
                    this.life = 1.0;
                    this.decay = 0.02 + Math.random() * 0.03;
                    this.color = Math.random() > 0.5 ? 'rgba(244, 180, 26, ' : 'rgba(0, 255, 204, ';
                }
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.type === 'spark') {
                    this.vy += 0.2; // Trọng lực hút tia lửa xuống
                }
                this.life -= this.decay;
            }

            draw() {
                if (this.life <= 0) return;
                ctx.fillStyle = this.color + Math.max(0, this.life) + ')';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
            }
        }

        // ==========================================
        // KHỞI TẠO MẢNG & DỮ LIỆU GAME
        // ==========================================
        const drawers = [
            new Drawer('truyen-mieng', 'Truyền miệng', 150, 50, 250, 120),
            new Drawer('chu-viet', 'Chữ viết', 475, 50, 250, 120),
            new Drawer('hien-vat', 'Hiện vật', 800, 50, 250, 120)
        ];
        
        let artifacts = [];

        function initGame() {
            artifacts = dataItems.map(data => new Artifact(data));
            itemsPlaced = 0;
            particles = [];
            dragItem = null;
        }

        // ==========================================
        // CÁC HÀM RENDER CHÍNH
        // ==========================================

        // Hàm ngắt dòng chữ an toàn
        function wrapText(context, text, x, y, maxWidth, lineHeight) {
            const words = text.split(' ');
            let line = '';
            let currentY = y;
            for(let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                let metrics = context.measureText(testLine);
                if (metrics.width > maxWidth && n > 0) {
                    context.fillText(line, x, currentY);
                    line = words[n] + ' ';
                    currentY += lineHeight;
                } else {
                    line = testLine;
                }
            }
            context.fillText(line, x, currentY);
        }

        function drawBackground() {
            // Nền vân gỗ mặt bàn
            ctx.fillStyle = '#3b2313';
            ctx.fillRect(0, 0, cw, ch);

            // Đánh bóng tối ở 4 góc (Vignette)
            const gradient = ctx.createRadialGradient(cw/2, ch/2, 200, cw/2, ch/2, 800);
            gradient.addColorStop(0, 'rgba(0,0,0,0)');
            gradient.addColorStop(1, 'rgba(0,0,0,0.8)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, cw, ch);
        }

        function drawInfoPlaque() {
            // Khung hiển thị thông tin ở góc dưới cùng
            const pX = cw/2 - 450;
            const pY = ch - 140;
            const pW = 900;
            const pH = 110;

            ctx.shadowColor = 'rgba(0,0,0,0.8)';
            ctx.shadowBlur = 20;
            ctx.fillStyle = 'rgba(26, 15, 7, 0.9)';
            ctx.beginPath();
            ctx.roundRect(pX, pY, pW, pH, 10);
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#b5a642'; // Viền đồng
            ctx.lineWidth = 3;
            ctx.strokeRect(pX + 5, pY + 5, pW - 10, pH - 10);
            ctx.strokeStyle = '#5c3a21';
            ctx.lineWidth = 1;
            ctx.strokeRect(pX + 10, pY + 10, pW - 20, pH - 20);

            ctx.fillStyle = '#f4e4c1';
            ctx.font = 'italic 24px "Times New Roman"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';

            let textToShow = "Dùng kính lúp (chuột) nhấc từng hiện vật lên để kiểm tra thông tin...";
            if (dragItem) {
                textToShow = dragItem.desc;
                ctx.fillStyle = '#f4b41a'; // Vàng sáng khi đang đọc
            } else if (itemsPlaced === artifacts.length) {
                textToShow = "Tuyệt vời! Thầy/Trò đã phân loại hoàn hảo toàn bộ tư liệu.";
                ctx.fillStyle = '#00ffcc';
            }

            wrapText(ctx, textToShow, cw/2, pY + 25, pW - 60, 32);
        }

        // ==========================================
        // VÒNG LẶP GAME (GAME LOOP)
        // ==========================================
        function gameLoop() {
            if (gameState === 'START') return;
            time++;

            // Cập nhật Logic
            artifacts.forEach(item => item.update());

            // Sinh bụi nền tự nhiên
            if (particles.length < 50 && Math.random() < 0.1) {
                particles.push(new Particle(Math.random()*cw, Math.random()*ch, 'dust'));
            }
            
            // Xử lý Hạt
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            // --- VẼ MÀN HÌNH ---
            drawBackground();
            
            // Vẽ 3 Ngăn kéo
            drawers.forEach(d => d.draw());

            // Vẽ bảng thông tin
            drawInfoPlaque();

            // Vẽ các thẻ bài chưa đặt
            // Vẽ thẻ bình thường trước, thẻ đang kéo (dragItem) vẽ sau cùng để nó nổi lên trên
            artifacts.forEach(item => { if (item !== dragItem) item.draw(); });
            if (dragItem) dragItem.draw();

            // Vẽ hạt bụi/pháo hoa đè lên trên cùng
            particles.forEach(p => p.draw());

            // Màn hình chiến thắng
            if (gameState === 'WIN') {
                ctx.fillStyle = 'rgba(0,0,0,0.85)';
                ctx.fillRect(0, 0, cw, ch);
                
                ctx.fillStyle = '#f4b41a';
                ctx.font = 'bold 50px "Times New Roman"';
                ctx.textAlign = 'center';
                ctx.shadowColor = '#000';
                ctx.shadowBlur = 10;
                ctx.fillText("PHÂN LOẠI THÀNH CÔNG!", cw/2, ch/2 - 20);
                
                ctx.fillStyle = '#e0d4b8';
                ctx.font = '28px "Times New Roman"';
                ctx.fillText("Nhà khảo cổ học xuất sắc. Ký ức thời gian đã được lưu giữ an toàn.", cw/2, ch/2 + 40);
                ctx.shadowBlur = 0;
            }

            requestAnimationFrame(gameLoop);
        }

        // ==========================================
        // XỬ LÝ TƯƠNG TÁC (MOUSE & TOUCH)
        // ==========================================

        function getMousePos(evt) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let cx = evt.clientX;
            let cy = evt.clientY;
            if (evt.touches && evt.touches.length > 0) {
                cx = evt.touches[0].clientX;
                cy = evt.touches[0].clientY;
            }
            return {
                x: (cx - rect.left) * scaleX,
                y: (cy - rect.top) * scaleY
            };
        }

        // Kiểm tra toạ độ có nằm trong vùng Thẻ bài không (Có tính Scale)
        function isInsideItem(pos, item) {
            const halfW = (item.w * item.scale) / 2;
            const halfH = (item.h * item.scale) / 2;
            return pos.x >= item.x - halfW && pos.x <= item.x + halfW &&
                   pos.y >= item.y - halfH && pos.y <= item.y + halfH;
        }

        // Kiểm tra va chạm với Ngăn kéo (Hitbox)
        function checkDrawerHover(pos) {
            drawers.forEach(d => d.isHovered = false); // Reset hết
            for (let d of drawers) {
                if (pos.x >= d.x && pos.x <= d.x + d.w &&
                    pos.y >= d.y && pos.y <= d.y + d.h) {
                    d.isHovered = true;
                    return d;
                }
            }
            return null;
        }

        function playSound(audioEl) {
            audioEl.currentTime = 0;
            audioEl.play().catch(()=>{});
        }

        // Bắt đầu kéo
        function handleDown(e) {
            if (gameState !== 'PLAYING') return;
            const pos = getMousePos(e);
            
            // Duyệt từ trên xuống (phần tử cuối mảng vẽ lên cùng)
            for (let i = artifacts.length - 1; i >= 0; i--) {
                let item = artifacts[i];
                if (!item.isPlaced && isInsideItem(pos, item)) {
                    isDragging = true;
                    dragItem = item;
                    dragOffsetX = pos.x - item.x;
                    dragOffsetY = pos.y - item.y;
                    
                    // Hiệu ứng nhấc lên
                    item.targetScale = 1.15;
                    item.targetAngle = 0; // Cầm lên thì để thẳng lại cho dễ đọc
                    playSound(sfxPaper);
                    playSound(sfxSlide);

                    // Đẩy thẻ đang cầm xuống cuối mảng để vẽ nổi lên trên
                    artifacts.splice(i, 1);
                    artifacts.push(item);
                    break;
                }
            }
        }

        // Đang kéo
        function handleMove(e) {
            if (!isDragging || !dragItem) return;
            e.preventDefault(); // Chống cuộn màn hình trên đt
            const pos = getMousePos(e);
            
            dragItem.targetX = pos.x - dragOffsetX;
            dragItem.targetY = pos.y - dragOffsetY;

            checkDrawerHover(pos);
        }

        // Thả tay
        function handleUp(e) {
            if (!isDragging || !dragItem) return;
            
            const pos = getMousePos(e);
            const droppedDrawer = checkDrawerHover(pos);
            
            if (droppedDrawer) {
                if (droppedDrawer.id === dragItem.type) {
                    // => ĐÚNG NGĂN KÉO
                    dragItem.isPlaced = true;
                    itemsPlaced++;
                    playSound(sfxSuccess);
                    
                    // Nổ pháo hoa hạt
                    for(let i=0; i<30; i++) {
                        particles.push(new Particle(droppedDrawer.x + droppedDrawer.w/2, droppedDrawer.y + droppedDrawer.h/2, 'spark'));
                    }

                    if (itemsPlaced === artifacts.length) {
                        setTimeout(() => {
                            gameState = 'WIN';
                            playSound(sfxWin);
                        }, 1000);
                    }
                } else {
                    // => SAI NGĂN KÉO (Trả về vị trí cũ)
                    dragItem.targetX = dragItem.originX;
                    dragItem.targetY = dragItem.originY;
                    dragItem.targetAngle = dragItem.originAngle;
                    playSound(sfxError);
                }
            } else {
                // Thả ra ngoài bàn (Trả về vị trí cũ)
                dragItem.targetX = dragItem.originX;
                dragItem.targetY = dragItem.originY;
                dragItem.targetAngle = dragItem.originAngle;
                playSound(sfxSlide);
            }

            dragItem.targetScale = 1.0;
            dragItem = null;
            isDragging = false;
            drawers.forEach(d => d.isHovered = false);
        }

        // Đăng ký sự kiện
        canvas.addEventListener('mousedown', handleDown);
        canvas.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleUp);
        
        canvas.addEventListener('touchstart', handleDown, {passive: false});
        canvas.addEventListener('touchmove', handleMove, {passive: false});
        window.addEventListener('touchend', handleUp);

        // Nút Start
        document.getElementById('btn-start').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            initGame();
            gameState = 'PLAYING';
            gameLoop();
            
            // Trick để trình duyệt cho phép phát âm thanh
            sfxPaper.volume = 0; sfxPaper.play().then(()=> {sfxPaper.pause(); sfxPaper.volume=1;}).catch(()=>{});
        });

    </script>
</body>
</html>
