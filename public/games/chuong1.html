<script>
// =====================================================================
//  THIẾT LẬP CANVAS
// =====================================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const CW = 1200, CH = 800;
let DPR = 1;

function setupCanvas() {
  DPR = window.devicePixelRatio || 1;
  canvas.width  = CW * DPR;
  canvas.height = CH * DPR;
  canvas.style.width  = '';
  canvas.style.height = '';
  ctx.scale(DPR, DPR);
}
setupCanvas();
window.addEventListener('resize', setupCanvas);

// =====================================================================
//  HÀM TIỆN ÍCH
// =====================================================================
function drawRoundRect(c, x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r);
  c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

function lerp(a, b, t) { return a + (b - a) * t; }

function wrapText(c, text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '', cy = y;
  words.forEach((word, i) => {
    const test = line + word + ' ';
    if (c.measureText(test).width > maxW && i > 0) {
      c.fillText(line.trim(), x, cy);
      line = word + ' '; cy += lineH;
    } else line = test;
  });
  c.fillText(line.trim(), x, cy);
}

// =====================================================================
//  HỆ THỐNG ÂM THANH
// =====================================================================
let audioCtx = null;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function tone(freq, type, dur, vol = 0.12, detune = 0) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const t = audioCtx.currentTime;
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  if (detune) osc.detune.setValueAtTime(detune, t);
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol, t + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + dur);
}

const SFX = {

  success() {
    tone(660, 'sine', 0.12, 0.12);

};

// =====================================================================
//  DRAWER CLASS
// =====================================================================
class Drawer {
  constructor(id, label, x, y, w, h) {
    this.id = id; this.label = label;
    this.x = x; this.y = y; this.w = w; this.h = h;
    this.isHovered = false; this.glow = 0;
    this.sinkOffset = 0; // animation
  }

  draw(alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(this.x, this.y + this.sinkOffset);

    // Shadow
    ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 18; ctx.shadowOffsetY = 8;

    // Body gradient – wood grain
    const grad = ctx.createLinearGradient(0, 0, this.w, this.h);
    grad.addColorStop(0, '#6e3d1e');
    grad.addColorStop(0.3, '#4d2810');
    grad.addColorStop(0.7, '#5c3218');
    grad.addColorStop(1, '#2c1608');
    ctx.fillStyle = grad;
    drawRoundRect(ctx, 0, 0, this.w, this.h, 6);
    ctx.fill();

    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

    // Wood grain lines
    ctx.globalAlpha = alpha * 0.12;
    for (let i = 0; i < 6; i++) {
      const gx = 15 + i * 40;
      ctx.strokeStyle = '#f4d090'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx + 5, this.h); ctx.stroke();
    }
    ctx.globalAlpha = alpha;

    // Outer border
    ctx.strokeStyle = '#1a0c04'; ctx.lineWidth = 4;
    drawRoundRect(ctx, 0, 0, this.w, this.h, 6);
    ctx.stroke();

    // Inner bevel highlight
    ctx.strokeStyle = 'rgba(244,200,100,0.15)'; ctx.lineWidth = 1;
    drawRoundRect(ctx, 3, 3, this.w-6, this.h-6, 4);
    ctx.stroke();

    // Glow on hover
    this.glow = this.isHovered ? Math.min(this.glow + 0.12, 1) : Math.max(this.glow - 0.12, 0);
    if (this.glow > 0) {
      ctx.globalAlpha = this.glow * 0.25 * alpha;
      ctx.fillStyle = '#f4b41a';
      drawRoundRect(ctx, 2, 2, this.w-4, this.h-4, 5);
      ctx.fill();
      ctx.globalAlpha = alpha;
    }

    // Handle (knob)
    const kx = this.w/2 - 45, ky = 14, kw = 90, kh = 16;
    const kGrad = ctx.createLinearGradient(kx, ky, kx, ky+kh);
    kGrad.addColorStop(0, '#e8c87a'); kGrad.addColorStop(1, '#b08030');
    ctx.fillStyle = kGrad;
    drawRoundRect(ctx, kx, ky, kw, kh, 5);
    ctx.fill();
    ctx.strokeStyle = '#5c3a10'; ctx.lineWidth = 1.5;
    drawRoundRect(ctx, kx, ky, kw, kh, 5);
    ctx.stroke();

    // Label plate
    const lx = this.w/2 - 80, ly = 42, lw = 160, lh = 46;
    const plGrad = ctx.createLinearGradient(lx, ly, lx, ly+lh);
    plGrad.addColorStop(0, '#e8d8b0'); plGrad.addColorStop(1, '#c8b880');
    ctx.fillStyle = plGrad;
    drawRoundRect(ctx, lx, ly, lw, lh, 4);
    ctx.fill();
    ctx.strokeStyle = '#8b5a2b'; ctx.lineWidth = 2;
    drawRoundRect(ctx, lx, ly, lw, lh, 4);
    ctx.stroke();

    // Label text
    ctx.fillStyle = '#2c1608'; ctx.font = 'bold 20px "Times New Roman"';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(this.label, this.w/2, ly + lh/2);

    ctx.restore();
  }

  contains(px, py) {
    return px >= this.x && px <= this.x + this.w &&
           py >= this.y + this.sinkOffset && py <= this.y + this.sinkOffset + this.h;
  }
}

// =====================================================================
//  ARTIFACT CLASS
// =====================================================================
class Artifact {
  constructor(data) {
    this.id = data.id; this.type = data.type;
    this.label = data.label; this.icon = data.icon;
    this.w = 162; this.h = 108;
    this.originX = Math.random() * (CW - 360) + 180;
    this.originY = Math.random() * (CH - 480) + 310;
    this.x = this.originX; this.y = this.originY;
    this.originAngle = (Math.random() - 0.5) * 0.45;
    this.angle = this.originAngle;
    this.scale = 1;
    this.targetX = this.x; this.targetY = this.y;
    this.targetAngle = this.angle; this.targetScale = 1;
    this.alpha = 1; this.isPlaced = false;
    this.isCorrect = false;
    // Random sepia variation for parchment
    this.colorVar = Math.random() * 20 - 10;
  }

  update() {
    if (this.isPlaced) return;
    const sp = 0.18;
    this.x += (this.targetX - this.x) * sp;
    this.y += (this.targetY - this.y) * sp;
    this.angle += (this.targetAngle - this.angle) * sp;
    this.scale += (this.targetScale - this.scale) * sp;
  }

  draw() {
    if (this.isPlaced) return;
    if (this.alpha <= 0) return;
    const lifted = this.scale > 1.05;

    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.scale(this.scale, this.scale);

    // Shadow
    ctx.shadowColor = lifted ? 'rgba(0,0,0,0.5)' : 'rgba(0,0,0,0.35)';
    ctx.shadowBlur  = lifted ? 28 : 8;
    ctx.shadowOffsetX = lifted ? 0 : 2;
    ctx.shadowOffsetY = lifted ? 18 : 4;

    // Parchment background
    const r = 185 + this.colorVar, g = 160 + this.colorVar * 0.6, b = 110 + this.colorVar * 0.3;
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    drawRoundRect(ctx, -this.w/2, -this.h/2, this.w, this.h, 9);
    ctx.fill();

    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0; ctx.shadowOffsetX = 0;

    // Parchment texture overlay
    ctx.globalAlpha = this.alpha * 0.08;
    for (let i = 0; i < 4; i++) {
      ctx.strokeStyle = '#8b6020'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(-this.w/2, -this.h/2 + 20 + i*18);
      ctx.lineTo(this.w/2, -this.h/2 + 20 + i*18); ctx.stroke();
    }
    ctx.globalAlpha = this.alpha;

    // Inner border
    ctx.strokeStyle = '#b08040'; ctx.lineWidth = 1.5;
    drawRoundRect(ctx, -this.w/2+7, -this.h/2+7, this.w-14, this.h-14, 5);
    ctx.stroke();

    // Wax seal dot
    ctx.fillStyle = '#8b0000';
    ctx.beginPath(); ctx.arc(-this.w/2+18, -this.h/2+18, 9, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,200,180,0.4)';
    ctx.beginPath(); ctx.arc(-this.w/2+15, -this.h/2+15, 4, 0, Math.PI*2); ctx.fill();

    // Label text
    ctx.fillStyle = '#2a1406';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const words = this.label.split(' ');
    if (words.length <= 2) {
      ctx.font = 'bold 19px "Times New Roman"';
      ctx.fillText(this.label, 4, 0);
    } else if (words.length === 3) {
      ctx.font = 'bold 18px "Times New Roman"';
      ctx.fillText(words[0], 4, -13);
      ctx.fillText(words.slice(1).join(' '), 4, 12);
    } else {
      ctx.font = 'bold 17px "Times New Roman"';
      ctx.fillText(words.slice(0, Math.ceil(words.length/2)).join(' '), 4, -13);
      ctx.fillText(words.slice(Math.ceil(words.length/2)).join(' '), 4, 12);
    }

    ctx.restore();
  }
}

// =====================================================================
//  PARTICLE CLASS
// =====================================================================
class Particle {
  constructor(x, y, kind) {
    this.x = x; this.y = y; this.kind = kind;
    if (kind === 'dust') {
      this.vx = (Math.random()-0.5)*0.6; this.vy = (Math.random()-0.5)*0.6 - 0.3;
      this.size = Math.random()*2+0.5; this.life = Math.random()*0.6+0.2; this.decay = 0.004;
      this.col = `rgba(220,200,160,`;
    } else if (kind === 'spark') {
      const a = Math.random()*Math.PI*2, sp = Math.random()*9+3;
      this.vx = Math.cos(a)*sp; this.vy = Math.sin(a)*sp;
      this.size = Math.random()*4+2; this.life = 1; this.decay = 0.022+Math.random()*0.03;
      const r = Math.random();
      this.col = r < 0.4 ? 'rgba(255,200,50,' : r < 0.7 ? 'rgba(255,120,30,' : 'rgba(200,255,220,';
    } else { // confetti
      const a = Math.random()*Math.PI*2, sp = Math.random()*6+2;
      this.vx = Math.cos(a)*sp; this.vy = Math.sin(a)*sp - 4;
      this.size = Math.random()*6+3; this.life = 1; this.decay = 0.015+Math.random()*0.02;
      const cols = ['rgba(244,177,26,','rgba(0,220,160,','rgba(255,100,100,','rgba(100,200,255,'];
      this.col = cols[Math.floor(Math.random()*cols.length)];
      this.rot = Math.random()*Math.PI*2; this.rotV = (Math.random()-0.5)*0.2;
    }
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    if (this.kind === 'spark' || this.kind === 'confetti') this.vy += 0.25;
    if (this.kind === 'confetti') { this.vx *= 0.98; this.rot += this.rotV; }
    this.life -= this.decay;
  }
  draw() {
    if (this.life <= 0) return;
    ctx.globalAlpha = Math.max(0, this.life);
    if (this.kind === 'confetti') {
      ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rot);
      ctx.fillStyle = this.col + '1)';
      ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size*0.6);
      ctx.restore();
    } else {
      ctx.fillStyle = this.col + Math.max(0, this.life) + ')';
      ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

function burst(x, y, n = 30) {
  for (let i = 0; i < n; i++) particles.push(new Particle(x, y, 'spark'));
  for (let i = 0; i < 20; i++) particles.push(new Particle(x, y, 'confetti'));
}

// =====================================================================
//  BACKGROUND DRAWING
// =====================================================================
function drawBackground() {
  // Dark wood base
  ctx.fillStyle = '#2e1a0a';
  ctx.fillRect(0, 0, CW, CH);

  // Radial grain pattern
  for (let i = 0; i < 8; i++) {
    const gx = (i % 3) * 450 + 100;
    ctx.strokeStyle = `rgba(80,40,10,0.3)`;
    ctx.lineWidth = 60 + i * 20;
    ctx.beginPath();
    ctx.arc(gx, CH/2 + (i%2?100:-100), 300 + i*80, 0, Math.PI*2);
    ctx.stroke();
  }

  // Horizontal planks
  ctx.globalAlpha = 0.18;
  for (let i = 0; i < 14; i++) {
    const y = i * 60;
    ctx.strokeStyle = i%2 ? '#5c3010' : '#3a1e08';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CW, y); ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Vignette
  const vig = ctx.createRadialGradient(CW/2, CH/2, 200, CW/2, CH/2, 820);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(0.6, 'rgba(0,0,0,0.2)');
  vig.addColorStop(1, 'rgba(0,0,0,0.82)');
  ctx.fillStyle = vig; ctx.fillRect(0,0,CW,CH);

  // Ambient dust particles
  if (particles.filter(p=>p.kind==='dust').length < 55 && Math.random()<0.12)
    particles.push(new Particle(Math.random()*CW, Math.random()*CH, 'dust'));
}

// =====================================================================
//  DRAW LEVEL 1
// =====================================================================
function drawLevel1(alpha) {
  // Score bar
  ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  drawRoundRect(ctx, CW/2 - 140, CH - 46, 280, 36, 6); ctx.fill();
  ctx.fillStyle = '#d4b880'; ctx.font = 'bold 20px "Times New Roman"';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(`Đã xếp: ${itemsPlaced} / 6`, CW/2, CH - 28);
  ctx.globalAlpha = 1;

  // Drawers
  drawers.forEach(d => d.draw(alpha));

  // Instruction hint
  ctx.globalAlpha = alpha * (0.5 + 0.2*Math.sin(time*0.05));
  ctx.fillStyle = '#c4a060'; ctx.font = '18px "Times New Roman"';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText('✦ Kéo thẻ bài vào đúng ngăn kéo ✦', CW/2, CH - 54);
  ctx.globalAlpha = 1;
}

// =====================================================================
//  DRAW LEVEL 2 SCROLL
// =====================================================================
function drawLevel2Scroll() {
  const sw = 820, sh = 540;
  const sx = CW/2, sy = scrollY;

  ctx.save();

  // Shake on wrong answer
  const sh2 = wrongShake > 0 ? Math.sin(wrongShake * 1.8) * 8 * (wrongShake/20) : 0;
  ctx.translate(sh2, 0);

  ctx.save();
  ctx.translate(sx, sy);

  // Drop shadow
  ctx.shadowColor = 'rgba(0,0,0,0.85)'; ctx.shadowBlur = 40; ctx.shadowOffsetY = 25;

  // Top and bottom rollers
  const rollerGrad = ctx.createLinearGradient(-sw/2-14, 0, sw/2+14, 0);
  rollerGrad.addColorStop(0, '#a07040');
  rollerGrad.addColorStop(0.5, '#d4a860');
  rollerGrad.addColorStop(1, '#a07040');

  ctx.fillStyle = rollerGrad;
  // Top roller
  ctx.beginPath(); ctx.roundRect(-sw/2-12, -sh/2-18, sw+24, 28, 8); ctx.fill();
  // Bottom roller
  ctx.beginPath(); ctx.roundRect(-sw/2-12, sh/2-10, sw+24, 28, 8); ctx.fill();

  // End caps
  [-sw/2-18, sw/2+18].forEach(cx => {
    [-sh/2-4, sh/2+4].forEach(cy => {
      ctx.beginPath(); ctx.arc(cx, cy, 16, 0, Math.PI*2); ctx.fill();
    });
  });

  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

  // Parchment body
  const parchGrad = ctx.createLinearGradient(-sw/2, -sh/2, sw/2, sh/2);
  parchGrad.addColorStop(0,   '#f6ecd4');
  parchGrad.addColorStop(0.15,'#ede0c0');
  parchGrad.addColorStop(0.5, '#f2e6c8');
  parchGrad.addColorStop(0.85,'#e8d8b0');
  parchGrad.addColorStop(1,   '#f4e8cc');
  ctx.fillStyle = parchGrad;
  ctx.fillRect(-sw/2, -sh/2, sw, sh);

  // Aged edges
  const edgeFade = ctx.createLinearGradient(-sw/2, 0, -sw/2+30, 0);
  edgeFade.addColorStop(0, 'rgba(100,60,10,0.25)'); edgeFade.addColorStop(1, 'transparent');
  ctx.fillStyle = edgeFade; ctx.fillRect(-sw/2, -sh/2, 30, sh);
  const edgeFade2 = ctx.createLinearGradient(sw/2, 0, sw/2-30, 0);
  edgeFade2.addColorStop(0, 'rgba(100,60,10,0.25)'); edgeFade2.addColorStop(1, 'transparent');
  ctx.fillStyle = edgeFade2; ctx.fillRect(sw/2-30, -sh/2, 30, sh);

  // Border
  ctx.strokeStyle = '#a07030'; ctx.lineWidth = 3;
  ctx.strokeRect(-sw/2+12, -sh/2+12, sw-24, sh-24);
  ctx.strokeStyle = 'rgba(160,110,40,0.3)'; ctx.lineWidth = 1;
  ctx.strokeRect(-sw/2+16, -sh/2+16, sw-32, sh-32);

  // Texture lines
  ctx.globalAlpha = 0.05;
  for (let i = 0; i < 20; i++) {
    ctx.strokeStyle = '#6a4010'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(-sw/2, -sh/2 + i*28); ctx.lineTo(sw/2, -sh/2 + i*28); ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Content – only when scroll is in view
  if (sy >= CH/2 - sh/2 - 80 && gameState !== 'WIN') {
    const qData = QUESTIONS[currentQ];
    const qY = -sh/2;

    // Header
    ctx.fillStyle = '#7a1c0a'; ctx.font = 'bold 15px "Times New Roman"';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText('✦ CUỘN GIẤY THỜI GIAN ✦', 0, qY + 18);
    ctx.fillStyle = '#a07030'; ctx.fillRect(-sw/4, qY+40, sw/2, 1);

    ctx.fillStyle = '#8b1a0a'; ctx.font = 'bold 26px "Times New Roman"';
    ctx.fillText(`CÂU HỎI  ${currentQ+1} / 3`, 0, qY + 52);

    // Question
    ctx.fillStyle = '#2a1006'; ctx.font = 'bold 26px "Times New Roman"';
    ctx.textBaseline = 'top';
    wrapText(ctx, qData.q, 0, qY + 96, sw-100, 34);

    // Options
    optionBoxes = [];
    const baseOY = qY + 240;
    qData.opts.forEach((opt, idx) => {
      const col = idx % 2;
      const row = Math.floor(idx / 2);
      const bw = 330, bh = 60;
      const bx = (col === 0 ? -bw - 20 : 20);
      const by = baseOY + row * 80;
      const screenX = sx + bx;
      const screenY = sy + by;

      optionBoxes.push({ x: screenX, y: screenY, w: bw, h: bh, idx });

      // Hover detection
      const mx = lastMouseX, my = lastMouseY;
      const hovered = mx >= screenX && mx <= screenX+bw && my >= screenY && my <= screenY+bh;

      const bGrad = ctx.createLinearGradient(bx, by, bx, by+bh);
      if (hovered) {
        bGrad.addColorStop(0, '#e8d090'); bGrad.addColorStop(1, '#c8a850');
      } else {
        bGrad.addColorStop(0, '#dfd0a0'); bGrad.addColorStop(1, '#bfa860');
      }
      ctx.fillStyle = bGrad;
      drawRoundRect(ctx, bx, by, bw, bh, 10); ctx.fill();
      ctx.strokeStyle = hovered ? '#8b5010' : '#a08040'; ctx.lineWidth = hovered ? 2.5 : 1.5;
      drawRoundRect(ctx, bx, by, bw, bh, 10); ctx.stroke();

      // Answer index badge
      const labels = ['A', 'B', 'C', 'D'];
      ctx.fillStyle = '#7a3a10'; ctx.font = 'bold 16px "Times New Roman"';
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(labels[idx], bx + 14, by + bh/2);

      ctx.fillStyle = '#2a1006'; ctx.font = 'bold 20px "Times New Roman"';
      ctx.textAlign = 'center';
      ctx.fillText(opt, bx + bw/2 + 8, by + bh/2);
    });
  }

  ctx.restore();

  // Feedback flash
  if (answerFeedback) {
    const { correct, timer } = answerFeedback;
    const a = Math.min(1, timer / 20) * (correct ? 0.7 : 0.5);
    ctx.globalAlpha = a;
    ctx.fillStyle = correct ? 'rgba(50,200,80,0.3)' : 'rgba(200,50,50,0.35)';
    ctx.fillRect(0, 0, CW, CH);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// =====================================================================
//  WIN SCREEN
// =====================================================================
function drawWinScreen() {
  // Dark overlay
  ctx.fillStyle = `rgba(0,0,0,${Math.min(0.78, (time - winStartTime) * 0.015)})`;
  ctx.fillRect(0, 0, CW, CH);

  const prog = Math.min(1, (time - winStartTime) * 0.02);
  if (prog < 0.3) return;
  const ta = Math.min(1, (prog - 0.3) * 3);

  // Golden glow
  const glowGrad = ctx.createRadialGradient(CW/2, CH/2, 0, CW/2, CH/2, 300);
  glowGrad.addColorStop(0, `rgba(240,180,30,${ta*0.25})`);
  glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glowGrad; ctx.fillRect(0,0,CW,CH);

  // Title
  ctx.globalAlpha = ta;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  // Glow pass
  ctx.shadowColor = '#f0b820'; ctx.shadowBlur = 40;
  ctx.fillStyle = '#f0b820';
  ctx.font = `bold ${Math.round(62 + Math.sin(time*0.05)*4)}px "Times New Roman"`;
  ctx.fillText('HOÀN THÀNH CHƯƠNG 1!', CW/2, CH/2 - 30);
  ctx.shadowBlur = 0;

  // Sub text
  ctx.fillStyle = '#e2d0a0'; ctx.font = '28px "Times New Roman"';
  ctx.fillText('✦  Em đã mở khóa Ký ức Lịch sử  ✦', CW/2, CH/2 + 40);

  // Replay button
  const btnW = 260, btnH = 54;
  const bx = CW/2 - btnW/2, by = CH/2 + 100;
  const bGrad = ctx.createLinearGradient(bx, by, bx, by+btnH);
  bGrad.addColorStop(0, '#d4b070'); bGrad.addColorStop(1, '#8b5a20');
  ctx.fillStyle = bGrad; drawRoundRect(ctx, bx, by, btnW, btnH, 10); ctx.fill();
  ctx.strokeStyle = '#f0d090'; ctx.lineWidth = 2;
  drawRoundRect(ctx, bx, by, btnW, btnH, 10); ctx.stroke();
  ctx.fillStyle = '#1a0d04'; ctx.font = 'bold 22px "Times New Roman"';
  ctx.fillText('↺  CHƠI LẠI', CW/2, by + btnH/2);

  replayBtn = { x: bx, y: by, w: btnW, h: btnH };
  ctx.globalAlpha = 1;
  ctx.shadowColor = 'transparent';
}

let winStartTime = 0;
let replayBtn = null;

// =====================================================================
//  MOUSE / TOUCH INPUT
// =====================================================================
let lastMouseX = -999, lastMouseY = -999;

function getCanvasPos(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = CW / rect.width;
  const scaleY = CH / rect.height;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top)  * scaleY
  };
}

function onPointerDown(cx, cy) {
  if (gameState !== 'LEVEL1') return;
  // Find topmost artifact under pointer
  for (let i = artifacts.length - 1; i >= 0; i--) {
    const a = artifacts[i];
    if (a.isPlaced) continue;
    const dx = cx - a.x, dy = cy - a.y;
    // Bounding box hit test (rotated approx)
    if (Math.abs(dx) < a.w/2 + 10 && Math.abs(dy) < a.h/2 + 10) {
      isDragging = true; dragItem = a;
      dragOffsetX = dx; dragOffsetY = dy;
      a.targetScale = 1.16;
      a.targetAngle = a.originAngle * 0.5;
      // Bring to end of array = render on top
      artifacts.splice(i, 1); artifacts.push(a);
      SFX.paper();
      break;
    }
  }
}

function onPointerMove(cx, cy) {
  lastMouseX = cx; lastMouseY = cy;
  if (!isDragging || !dragItem) return;
  dragItem.x = cx - dragOffsetX;
  dragItem.y = cy - dragOffsetY;
  dragItem.targetX = dragItem.x;
  dragItem.targetY = dragItem.y;

  // Hover highlight drawers
  drawers.forEach(d => {
    d.isHovered = d.contains(cx, cy);
  });
}

function onPointerUp(cx, cy) {
  if (!isDragging || !dragItem || gameState !== 'LEVEL1') { isDragging = false; return; }
  isDragging = false;

  // Check which drawer center is under
  let dropped = null;
  for (const d of drawers) {
    if (d.contains(cx, cy)) { dropped = d; break; }
  }
  drawers.forEach(d => d.isHovered = false);

  if (dropped) {
    if (dropped.id === dragItem.type) {
      // Correct!
      dragItem.isPlaced = true;
      dragItem.alpha = 0;
      dragItem.targetScale = 1;
      itemsPlaced++;
      SFX.success();
      burst(cx, cy, 40);
      if (itemsPlaced >= 6) {
        setTimeout(startTransition, 600);
      }
    } else {
      // Wrong
      SFX.error();
      dragItem.targetX = dragItem.originX;
      dragItem.targetY = dragItem.originY;
      dragItem.targetAngle = dragItem.originAngle;
      dragItem.targetScale = 1;
      // Shake
      shakeDur = 14; shakeIntensity = 7;
    }
  } else {
    // Snap back
    dragItem.targetX = dragItem.originX;
    dragItem.targetY = dragItem.originY;
    dragItem.targetAngle = dragItem.originAngle;
    dragItem.targetScale = 1;
    SFX.slide();
  }
  dragItem = null;
}

// Mouse
canvas.addEventListener('mousedown', e => {
  const {x,y} = getCanvasPos(e.clientX, e.clientY);
  onPointerDown(x, y);
});
canvas.addEventListener('mousemove', e => {
  const {x,y} = getCanvasPos(e.clientX, e.clientY);
  onPointerMove(x, y);
});
canvas.addEventListener('mouseup', e => {
  const {x,y} = getCanvasPos(e.clientX, e.clientY);
  onPointerUp(x, y);
  handleClick(x, y);
});

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const {x,y} = getCanvasPos(t.clientX, t.clientY);
  onPointerDown(x, y);
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  const {x,y} = getCanvasPos(t.clientX, t.clientY);
  onPointerMove(x, y);
}, {passive:false});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0]; // ← dùng changedTouches khi nhấc ngón tay
  const {x,y} = getCanvasPos(t.clientX, t.clientY);
  onPointerUp(x, y);
  handleClick(x, y);
}, {passive:false});

function handleClick(cx, cy) {
  // Level 2 answer click
  if (gameState === 'LEVEL2' && scrollY >= CH/2 - 50) {
    for (const box of optionBoxes) {
      if (cx >= box.x && cx <= box.x + box.w && cy >= box.y && cy <= box.y + box.h) {
        checkAnswer(box.idx);
        return;
      }
    }
  }
  // Win replay
  if (gameState === 'WIN' && replayBtn) {
    const b = replayBtn;
    if (cx >= b.x && cx <= b.x+b.w && cy >= b.y && cy <= b.y+b.h) {
      initGame(); gameState = 'LEVEL1';
    }
  }
}

// =====================================================================
//  LEVEL TRANSITION
// =====================================================================
function startTransition() {
  gameState = 'TRANSITION';
  SFX.rumble();
  // Shake screen
  shakeDur = 60; shakeIntensity = 10;
}

function checkAnswer(idx) {
  if (answerFeedback) return;
  const correct = idx === QUESTIONS[currentQ].ans;
  answerFeedback = { correct, timer: 40 };
  if (correct) {
    SFX.success();
    burst(CW/2, CH/2, 50);
    setTimeout(() => {
      answerFeedback = null;
      currentQ++;
      if (currentQ >= QUESTIONS.length) {
        gameState = 'WIN';
        winStartTime = time;
        SFX.win();
        for (let i = 0; i < 80; i++) setTimeout(() => burst(
          Math.random()*CW, Math.random()*CH*0.6, 25), i*40);
      }
    }, 700);
  } else {
    SFX.error();
    wrongShake = 20;
    setTimeout(() => { answerFeedback = null; }, 700);
  }
}

// =====================================================================
//  GAME LOOP
// =====================================================================
function gameLoop() {
  if (gameState === 'START') { requestAnimationFrame(gameLoop); return; }
  time++;

  // Camera shake
  let shakeX = 0, shakeY = 0;
  if (shakeDur > 0) {
    shakeX = (Math.random()-0.5)*shakeIntensity*(shakeDur/30);
    shakeY = (Math.random()-0.5)*shakeIntensity*(shakeDur/30);
    shakeDur--;
    if (shakeDur <= 0) shakeIntensity = 0;
  }
  if (wrongShake > 0) wrongShake -= 1;
  if (answerFeedback) answerFeedback.timer--;

  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawBackground();

  // Particles pass (behind content)
  particles.forEach(p => { if(p.kind==='dust') p.draw(); });

  // ---- LEVEL 1 / TRANSITION ----
  if (gameState === 'LEVEL1' || gameState === 'TRANSITION') {
    artifacts.forEach(a => a.update());

    // Transition: sink drawers, fade out, scroll in Level2
    if (gameState === 'TRANSITION') {
      drawerSinkY += 12;
      level1Alpha = Math.max(0, 1 - drawerSinkY/200);
      scrollY = lerp(scrollY, CH/2, 0.04);
      if (drawerSinkY > 220) {
        gameState = 'LEVEL2';
      }
    }

    // Draw drawers with sinkOffset
    drawers.forEach(d => {
      d.sinkOffset = drawerSinkY;
      d.draw(level1Alpha);
    });

    // Draw artifacts
    const draggedItem = dragItem;
    artifacts.forEach(a => { if (a !== draggedItem) a.draw(); });
    if (draggedItem) draggedItem.draw();

    if (gameState === 'LEVEL1') drawLevel1(level1Alpha);
  }

  // ---- LEVEL 2 ----
  if (gameState === 'LEVEL2' || gameState === 'WIN') {
    scrollY = lerp(scrollY, CH/2, 0.045);
    drawLevel2Scroll();
  }

  // ---- WIN ----
  if (gameState === 'WIN') {
    drawWinScreen();
  }

  // Foreground particles
  particles.forEach(p => { if(p.kind!=='dust') p.draw(); });
  for (let i = particles.length-1; i >= 0; i--) {
    particles[i].update();
    if (particles[i].life <= 0) particles.splice(i,1);
  }

  ctx.restore();
  requestAnimationFrame(gameLoop);
}

// =====================================================================
//  START BUTTON
// =====================================================================
document.getElementById('btn-start').addEventListener('click', () => {
  initAudio();
  initGame();
  gameState = 'LEVEL1';
  document.getElementById('start-screen').style.display = 'none';
  requestAnimationFrame(gameLoop);
});

// Kick off loop anyway so canvas isn't blank on start screen
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
